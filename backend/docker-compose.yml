version: '3'

services:
  # 1. แอปหลังบ้านของคุณ (Node.js API)
  app:
    build: .
    restart: always
    container_name: my-iot-app
    # 🔥 เปิดประตูให้โลกภายนอกยิงข้อมูลเข้า VPS ผ่านพอร์ต 3000 ได้
    ports:
      - "3000:3000"
    # 🔥 ดึงรหัสผ่านจากไฟล์ .env
    env_file:
      - .env
    networks:
      - iot_net

# 🔥 Network ให้ Container คุยกันเอง (เผื่ออนาคตลูกพี่เพิ่ม Database ลงไป)
networks:
  iot_net:
    driver: bridge